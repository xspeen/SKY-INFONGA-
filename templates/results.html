<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKY-INFONGA - Weather Results</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="theme-toggle">
        <input type="checkbox" id="themeSwitch" class="theme-switch">
        <label for="themeSwitch" class="switch-label">
            <i class="fas fa-sun"></i>
            <i class="fas fa-moon"></i>
            <span class="ball"></span>
        </label>
    </div>

    <div class="results-container">
        <header class="results-header">
            <img src="https://iili.io/qnH95mv.jpg" alt="SKY-INFONGA" class="results-logo" onerror="this.src='https://via.placeholder.com/60?text=SI'">
            <h1>Weather Intelligence Report</h1>
        </header>

        <div id="weatherResults" class="weather-results">
            <!-- Results will be dynamically inserted here -->
        </div>

        <div class="action-buttons">
            <button id="backToDashboard" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </button>
            <button id="refreshData" class="refresh-btn">
                <i class="fas fa-sync-alt"></i> Refresh Data
            </button>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
